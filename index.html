<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    
   
    <div class="button">
         <div class="display" id="display"></div>
        <button class="1" id="one" value="1">1</button>
        <button class="2" id="two" value="2">2</button>
        <button class="3" id="three"value="3">3</button> 
        <button class="4" id="four" value="4">4</button>
        <button class="5" id="five" value="5">5</button>
        <button class="6" id="six" value="6">6</button>
        <button class="7" id="seven" value="7">7</button>
        <button class="8" id="eight" value="8">8</button>
        <button class="9" id="nine" value="9">9</button>
        <button class="1" id="zero" value="0">0</button>
        <button class="equal" id="equal">=</button>
        <button class="C" id="C">C</button>
        <button class="plus" id="plus">+</button>
        <button class="minus" id="minus">-</button>
        <button class="multiply" id="multiply">*</button>
        <button class="dev" id="dev">/</button>
    </div>
    <script src="main.js"></script>
</body>
</html>
